spring.datasource.url=jdbc:h2:mem:gaia_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.hikari.connection-init-sql=
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.flyway.enabled=false
app.jwt.secret=gaia-test-secret
app.jwt.expiration-ms=3600000
app.cors.allowed-origins=http://localhost:4200,https://localhost:4200
