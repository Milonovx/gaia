<section class="auth-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5">
        <div class="auth-card">
          <span class="auth-icon"><fa-icon icon="lock"></fa-icon></span>
          <h1>Iniciar sesión</h1>
          <p>Accede para solicitar adopciones y gestionar tu cuenta.</p>

          <form [formGroup]="form" (ngSubmit)="submit()" class="mt-4">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" formControlName="email" placeholder="tu@email.com">
              <small class="text-danger" *ngIf="form.controls.email.touched && form.controls.email.invalid">Email valido requerido.</small>
            </div>
            <div class="mb-4">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" formControlName="password" placeholder="Tu password">
              <small class="text-danger" *ngIf="form.controls.password.touched && form.controls.password.invalid">Password requerido.</small>
            </div>
            <button class="btn btn-success w-100 rounded-pill" type="submit" [disabled]="loading">
              <span *ngIf="!loading">Ingresar</span>
              <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
            </button>
          </form>

          <div class="auth-footer">
            <span>No tienes cuenta?</span>
            <a routerLink="/registro">Crear cuenta</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
